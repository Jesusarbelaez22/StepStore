<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos — StepStore</title>
  <link rel="icon" type="image/svg+xml" href="img/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/icons/favicon-180x180.png">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="padding-top:70px; min-height:100vh;">

<nav class="navbar scrolled">
  <div class="navbar-inner">
    <button class="hamburger" aria-label="Menú"><span></span><span></span><span></span></button>
    <a href="index.html" class="logo"><span class="neon">S</span>TEP <span class="neon">S</span>TORE</a>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="catalogo.html">Catálogo</a>
      <a href="catalogo.html?sort=newest">Novedades</a>
      <a href="catalogo.html">Marcas</a>
    </div>
    <div class="nav-actions">
      <button class="nav-action-btn search-trigger"><i data-lucide="search" class="icon-lg"></i></button>
      <a href="wishlist.html" class="nav-action-btn"><i data-lucide="heart" class="icon-lg"></i><span class="wishlist-badge" style="display:none">0</span></a>
      <a href="carrito.html" class="nav-action-btn"><i data-lucide="shopping-cart" class="icon-lg"></i><span class="cart-badge" style="display:none">0</span></a>
    </div>
  </div>
</nav>

<div id="mobile-overlay"></div>
<div id="mobile-menu">
  <div class="mobile-logo"><span class="neon">S</span>TEP <span class="neon">S</span>TORE</div>
  <a href="index.html" class="mobile-nav-link">Inicio</a>
  <a href="catalogo.html" class="mobile-nav-link">Catálogo</a>
  <a href="wishlist.html" class="mobile-nav-link"><i data-lucide="heart"></i> Favoritos</a>
  <a href="carrito.html" class="mobile-nav-link"><i data-lucide="shopping-cart"></i> Carrito</a>
</div>

<div id="search-overlay">
  <div class="search-wrapper">
    <input class="search-input" type="text" placeholder="Busca zapatillas, marcas..." autocomplete="off">
    <button class="search-close" onclick="closeSearch()"><i data-lucide="x"></i></button>
  </div>
  <div id="search-results"></div>
</div>

<div style="background:var(--bg-secondary); padding:40px 0; border-bottom:1px solid var(--border);">
  <div class="container">
    <h1 style="font-size:3rem;">MIS FAVORITOS</h1>
    <div id="wishlist-count-header" style="color:var(--text-secondary); margin-top:4px; font-size:0.9rem;"></div>
  </div>
</div>

<div class="container" style="padding: 40px 24px 80px;">
  <div id="wishlist-root"></div>
</div>

<footer class="footer">
  <div class="container">
    <nav class="footer-mini-nav">
      <a href="catalogo.html">Catálogo</a>
      <a href="tallas.html">Guía de tallas</a>
      <a href="#">Envíos y devoluciones</a>
      <a href="#">Contacto</a>
    </nav>
    <div class="footer-bottom">
      <p>© 2026 StepStore. Todos los derechos reservados.</p>
      <div class="payment-methods"><span>PSE</span><span>Visa</span><span>MC</span><span>Nequi</span></div>
    </div>
  </div>
</footer>

<button id="scroll-top"><i data-lucide="arrow-up"></i></button>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/search.js"></script>
<script src="js/ui.js"></script>
<script>lucide.createIcons();</script>
<script>
  function renderWishlist() {
    const ids = getWishlist();
    const root = document.getElementById('wishlist-root');
    const header = document.getElementById('wishlist-count-header');

    header.textContent = ids.length ? `${ids.length} producto${ids.length !== 1 ? 's' : ''} guardado${ids.length !== 1 ? 's' : ''}` : '';

    if (!ids.length) {
      root.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i data-lucide="heart" class="icon-xl"></i></div>
          <h3>TU LISTA ESTÁ VACÍA</h3>
          <p>Guarda tus zapatillas favoritas para no perderlas de vista.</p>
          <a href="catalogo.html" class="btn-primary" style="display:inline-flex; margin-top:8px;">Explorar catálogo <i data-lucide="arrow-right"></i></a>
        </div>`;
      return;
    }

    const products = ids.map(id => getProductById(id)).filter(Boolean);
    root.innerHTML = `<div class="products-grid" style="margin-bottom:16px;">` +
      products.map(p => `
        <div class="product-card" data-id="${p.id}">
          <div class="card-image-wrap">
            <a href="producto.html?id=${p.id}">
              <img src="${p.images[0]}" alt="${p.name}" loading="lazy">
            </a>
            ${p.badge ? `<span class="badge badge-${p.badge.toLowerCase()}">${p.badge}</span>` : ''}
            <button class="wishlist-btn active" onclick="handleWishlistRemove(${p.id})"><i data-lucide="heart"></i></button>
          </div>
          <div class="card-info">
            <span class="card-brand">${p.brand}</span>
            <a href="producto.html?id=${p.id}" class="card-name">${p.name}</a>
            <div class="card-rating">${renderStars(p.rating)} <span>(${p.reviews})</span></div>
            <div class="card-footer">
              <div class="card-price">
                <span class="price-current">${formatPrice(p.price)}</span>
                ${p.originalPrice ? `<span class="price-original">${formatPrice(p.originalPrice)}</span>` : ''}
              </div>
              <button class="btn-add-cart" onclick="handleMoveToCart(${p.id})"><i data-lucide="arrow-right"></i> Carrito</button>
            </div>
          </div>
        </div>
      `).join('') + `</div>`;
  }

  function handleWishlistRemove(productId) {
    removeFromWishlist(productId);
    showToast('Eliminado de favoritos', 'info');
    renderWishlist();
    updateWishlistBadge();
    if (window.lucide) lucide.createIcons();
  }

  function handleMoveToCart(productId) {
    const p = getProductById(productId);
    if (!p) return;
    const size = p.sizes[Math.floor(p.sizes.length / 2)];
    addToCart(productId, size, 1);
    removeFromWishlist(productId);
    showToast(`¡${p.name} movido al carrito!`, 'success');
    animateCartBadge();
    renderWishlist();
    if (window.lucide) lucide.createIcons();
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderWishlist();
    if (window.lucide) lucide.createIcons();
  });
</script>
</body>
</html>
